  /update/status:
    get:
      tags: [Update]
      summary: Get update status
      description: Returns the last update check info including current version and whether an update is available.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Update status
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_version:
                    type: string
                  latest_version:
                    type: string
                  channel:
                    type: string
                  update_available:
                    type: boolean
                  last_checked:
                    type: string
                    format: date-time
                    nullable: true

  /update/check:
    post:
      tags: [Update]
      summary: Check for updates
      description: Triggers an immediate update check and returns the result.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Update check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_version:
                    type: string
                  latest_version:
                    type: string
                  update_available:
                    type: boolean
                  release_notes:
                    type: string
                    nullable: true

  /update/apply:
    post:
      tags: [Update]
      summary: Apply available update
      description: Downloads and applies an available update, then exits for restart.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Update applied, restarting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: No update available

  # ── Blocked Hashes ─────────────────────────
  /blocked-hashes:
    get:
      tags: [BlockedHashes]
      summary: List blocked hashes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of blocked hashes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlockedHash'

    post:
      tags: [BlockedHashes]
      summary: Add a blocked hash
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hash:
                  type: string
                reason:
                  type: string
              required: [hash]
      responses:
        '201':
          description: Hash blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedHash'

  /blocked-hashes/{hash}:
    delete:
      tags: [BlockedHashes]
      summary: Remove a blocked hash
      security:
        - bearerAuth: []
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Hash unblocked
        '404':
          description: Hash not found

# file: docs/openapi.yaml
# version: 2.0.0
# guid: 4d5e6f7a-8b9c-0d1e-2f3a-4b5c6d7e8f9a

openapi: 3.0.3
info:
  title: Audiobook Organizer API
  description: |
    REST API for the Audiobook Organizer application.
    Provides endpoints for managing audiobooks, authors, series, narrators,
    import paths, metadata, iTunes integration, AI parsing, AI scans,
    Open Library, works, version groups, tasks, updates, and more.
  version: 2.0.0
  contact:
    name: API Support
    url: https://github.com/jdfalk/audiobook-organizer
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8484/api/v1
    description: Local development server
  - url: /api/v1
    description: Relative path (for production deployment)

tags:
  - name: Health
    description: Health checks and events (unprotected)
  - name: Auth
    description: Authentication and session management
  - name: Audiobooks
    description: Audiobook management operations
  - name: Authors
    description: Author management
  - name: Narrators
    description: Narrator management
  - name: Series
    description: Series management
  - name: Library
    description: Import path / library folder management
  - name: Filesystem
    description: Filesystem browsing and exclusions
  - name: Operations
    description: Background operations (scan, organize, reconcile, etc.)
  - name: Import
    description: File import
  - name: iTunes
    description: iTunes library integration
  - name: Metadata
    description: Metadata fetching and management
  - name: Versions
    description: Version management for multiple editions
  - name: Covers
    description: Cover art proxy and local files
  - name: System
    description: System status and configuration
  - name: Backup
    description: Database backup and restore
  - name: AI
    description: AI-powered filename parsing and scanning
  - name: AIScans
    description: AI scan pipeline management
  - name: OpenLibrary
    description: Open Library data dump management
  - name: Works
    description: Work / canonical title management
  - name: VersionGroups
    description: Version group management
  - name: WorkQueue
    description: Background work queue
  - name: BlockedHashes
    description: Blocked file hash management
  - name: Tasks
    description: Scheduled task management
  - name: Update
    description: Application update management
  - name: Dedup
    description: Cross-entity deduplication validation

# ────────────────────────────────────────────
# Reusable parameters
# ────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: ulid
    intIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    limitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 10000
    offsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
    dryRunQuery:
      name: dry_run
      in: query
      schema:
        type: string
        enum: ["true", "false"]
      description: When "true", shows what would happen without making changes.

  schemas:
    # ── Core domain ──────────────────────────
    Book:
      type: object
      properties:
        id:
          type: string
          format: ulid
        title:
          type: string
        author_id:
          type: integer
          nullable: true
        author_name:
          type: string
          nullable: true
        series_id:
          type: integer
          nullable: true
        series_name:
          type: string
          nullable: true
        series_position:
          type: integer
          nullable: true
        file_path:
          type: string
        duration:
          type: integer
          description: Duration in seconds
          nullable: true
        narrator:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        cover_image:
          type: string
          nullable: true
        bitrate:
          type: integer
          description: Bitrate in kbps
          nullable: true
        codec:
          type: string
          nullable: true
        sample_rate:
          type: integer
          description: Sample rate in Hz
          nullable: true
        quality:
          type: string
          nullable: true
        is_primary_version:
          type: boolean
          nullable: true
        version_group_id:
          type: string
          format: ulid
          nullable: true
        version_notes:
          type: string
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - file_path
        - created_at
        - updated_at

    Author:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, name, created_at]

    Series:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        author_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, name, created_at]

    ImportPath:
      type: object
      properties:
        id:
          type: integer
        path:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_scan:
          type: string
          format: date-time
          nullable: true
        book_count:
          type: integer
      required: [id, path, name, enabled, created_at, book_count]

    MetadataResult:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        description:
          type: string
          nullable: true
        publisher:
          type: string
          nullable: true
        publish_year:
          type: integer
          nullable: true
        isbn:
          type: string
          nullable: true
        cover_url:
          type: string
          nullable: true
        language:
          type: string
          nullable: true

    SystemStatus:
      type: object
      properties:
        status:
          type: string
        library:
          type: object
          properties:
            book_count:
              type: integer
            folder_count:
              type: integer
            total_size:
              type: integer
              description: Total size in bytes
        memory:
          type: object
          properties:
            alloc_bytes:
              type: integer
            total_alloc_bytes:
              type: integer
            sys_bytes:
              type: integer
            num_gc:
              type: integer
        runtime:
          type: object
          properties:
            go_version:
              type: string
            num_goroutine:
              type: integer
            num_cpu:
              type: integer

    Config:
      type: object
      properties:
        root_dir:
          type: string
        database_path:
          type: string
        playlist_dir:
          type: string
        organization_strategy:
          type: string
          enum: [copy, hardlink, reflink, auto]
        scan_on_startup:
          type: boolean
        auto_organize:
          type: boolean
        folder_naming_pattern:
          type: string
        file_naming_pattern:
          type: string
        auto_fetch_metadata:
          type: boolean
        log_level:
          type: string
          enum: [debug, info, warn, error]

    # ── Supporting types ─────────────────────
    Work:
      type: object
      properties:
        id:
          type: string
          format: ulid
        title:
          type: string
        author_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VersionGroup:
      type: object
      properties:
        id:
          type: string
          format: ulid
        primary_book_id:
          type: string
          format: ulid
          nullable: true
        books:
          type: array
          items:
            $ref: '#/components/schemas/Book'

    BlockedHash:
      type: object
      properties:
        hash:
          type: string
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Operation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
        progress:
          type: number
        message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string

    PaginatedBooks:
      type: object
      properties:
        count:
          type: integer
          description: Total number of matching audiobooks (not page size)
        items:
          type: array
          items:
            $ref: '#/components/schemas/Book'
        limit:
          type: integer
        offset:
          type: integer

    CountResponse:
      type: object
      properties:
        count:
          type: integer

    DuplicateGroupsResponse:
      type: object
      properties:
        groups:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/Book'
        group_count:
          type: integer
        duplicate_count:
          type: integer

    AuthorAlias:
      type: object
      properties:
        id:
          type: integer
        author_id:
          type: integer
        alias:
          type: string
        created_at:
          type: string
          format: date-time

    BrokenSegmentResult:
      type: object
      properties:
        books_checked:
          type: integer
        broken_books:
          type: integer
        marked_for_review:
          type: integer
        details:
          type: array
          items:
            type: object
            properties:
              book_id:
                type: string
              title:
                type: string
              file_path:
                type: string
              total_segments:
                type: integer
              missing_segments:
                type: integer
              missing_paths:
                type: array
                items:
                  type: string

    MergeDuplicatesResult:
      type: object
      properties:
        total_no_vg:
          type: integer
        matched_to_vg:
          type: integer
        self_duplicates:
          type: integer
        metadata_merged:
          type: integer
        soft_deleted:
          type: integer
        remaining_orphans:
          type: integer
        errors:
          type: integer
        details:
          type: array
          items:
            type: object
            properties:
              duplicate_id:
                type: string
              primary_id:
                type: string
              title:
                type: string
              fields_merged:
                type: array
                items:
                  type: string
              action:
                type: string

# ────────────────────────────────────────────
# Paths
# ────────────────────────────────────────────
paths:
  # ── Health & Events (unprotected, note: /health etc. live outside /api/v1) ──
  # These are documented here for completeness; the actual mount points are
  # /health, /api/health, /api/v1/health, /metrics, /api/events.

  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns health status with library counts. Also available at /health, /api/health.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  book_count:
                    type: integer
                  author_count:
                    type: integer
                  series_count:
                    type: integer

  # ── Auth ────────────────────────────────────
  /auth/status:
    get:
      tags: [Auth]
      summary: Check authentication status
      description: Returns whether auth is enabled and if initial setup is needed.
      responses:
        '200':
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_enabled:
                    type: boolean
                  setup_required:
                    type: boolean

  /auth/setup:
    post:
      tags: [Auth]
      summary: Setup initial admin account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        '201':
          description: Admin account created
        '400':
          description: Setup already completed or invalid input
        '409':
          description: Admin already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
        '401':
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
        '401':
          description: Not authenticated

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    last_active:
                      type: string
                      format: date-time
                    user_agent:
                      type: string

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session revoked
        '404':
          description: Session not found

  # ── Audiobooks ──────────────────────────────
  /audiobooks:
    get:
      tags: [Audiobooks]
      summary: List audiobooks
      description: |
        Retrieve a paginated list of audiobooks with optional filtering and sorting.
        The `count` field in the response is the total number of matching audiobooks
        (not the page size). The limit parameter caps at 10000.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/limitQuery'
        - $ref: '#/components/parameters/offsetQuery'
        - name: search
          in: query
          schema:
            type: string
        - name: author_id
          in: query
          schema:
            type: integer
        - name: series_id
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, author, created_at, updated_at, duration]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Paginated list of audiobooks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBooks'
        '500':
          description: Internal server error

  /audiobooks/search:
    get:
      tags: [Audiobooks]
      summary: Search audiobooks
      description: Search audiobooks by query string. Returns paginated results.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/limitQuery'
        - $ref: '#/components/parameters/offsetQuery'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBooks'

  /audiobooks/count:
    get:
      tags: [Audiobooks]
      summary: Get total audiobook count
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'

  /audiobooks/duplicates:
    get:
      tags: [Audiobooks]
      summary: List duplicate audiobooks
      description: Returns groups of duplicate audiobooks with group and duplicate counts.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Groups of duplicate audiobooks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateGroupsResponse'

  /audiobooks/duplicates/scan-results:
    get:
      tags: [Audiobooks]
      summary: Get cached book duplicate scan results
      description: Returns cached results from the last async book-dedup scan.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cached scan results
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      type: array
                      items:
                        $ref: '#/components/schemas/Book'
                  group_count:
                    type: integer
                  duplicate_count:
                    type: integer
                  needs_refresh:
                    type: boolean

  /audiobooks/duplicates/scan:
    post:
      tags: [Audiobooks]
      summary: Trigger async book duplicate scan
      description: Starts a background operation to scan for book duplicates using metadata matching.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  operation_id:
                    type: string

  /audiobooks/duplicates/merge:
    post:
      tags: [Audiobooks]
      summary: Merge book duplicates as versions
      description: Merges duplicate book groups into version groups, keeping the primary and linking others.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groups:
                  type: array
                  items:
                    type: object
                    properties:
                      primary_id:
                        type: string
                      duplicate_ids:
                        type: array
                        items:
                          type: string
      responses:
        '200':
          description: Merge result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid request

  /audiobooks/duplicates/dismiss:
    post:
      tags: [Audiobooks]
      summary: Dismiss a book duplicate group
      description: Marks a duplicate group as dismissed so it no longer appears in scan results.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                group_key:
                  type: string
              required: [group_key]
      responses:
        '200':
          description: Group dismissed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /audiobooks/soft-deleted:
    get:
      tags: [Audiobooks]
      summary: List soft-deleted audiobooks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Soft-deleted audiobooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

  /audiobooks/purge-soft-deleted:
    delete:
      tags: [Audiobooks]
      summary: Permanently purge all soft-deleted audiobooks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Purged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /audiobooks/batch:
    post:
      tags: [Audiobooks]
      summary: Batch update audiobooks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: ulid
                updates:
                  $ref: '#/components/schemas/Book'
      responses:
        '200':
          description: Batch update successful
        '400':
          description: Invalid request

  /audiobooks/merge:
    post:
      tags: [Audiobooks]
      summary: Merge multiple audiobooks
      description: Merges source books into a target book, combining metadata and segments.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_id:
                  type: string
                  format: ulid
                source_ids:
                  type: array
                  items:
                    type: string
                    format: ulid
              required: [target_id, source_ids]
      responses:
        '200':
          description: Merge successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid request
        '404':
          description: Book not found

  /audiobooks/{id}:
    get:
      tags: [Audiobooks]
      summary: Get audiobook by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Audiobook details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Audiobook not found

    put:
      tags: [Audiobooks]
      summary: Update audiobook
      description: Full replacement update. Always pass the complete book object.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
      responses:
        '200':
          description: Updated audiobook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Invalid request body
        '404':
          description: Audiobook not found

    delete:
      tags: [Audiobooks]
      summary: Delete audiobook
      description: Soft-delete by default. Use hard=true to permanently remove. Use block_hash=true to also block the file hash.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idPath'
        - name: hard
          in: query
          schema:
            type: boolean
            default: false
        - name: block_hash
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Audiobook deleted
        '404':
          description: Audiobook not found

  /audiobooks/{id}/restore:
    post:
      tags: [Audiobooks]
      summary: Restore a soft-deleted audiobook
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Audiobook restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Audiobook not found

  /audiobooks/{id}/tags:
    get:
      tags: [Audiobooks]
      summary: Get audiobook file tags
      description: Returns raw metadata tags extracted from the audio file.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: File tags
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: Audiobook not found

  /audiobooks/{id}/cover:
    get:
      tags: [Covers]
      summary: Serve audiobook cover image
      description: Returns the cover image for an audiobook, extracted from the file or cached.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Cover image
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: No cover found

  /audiobooks/{id}/segments:
    get:
      tags: [Audiobooks]
      summary: List audiobook segments
      description: Returns the individual file segments (tracks/chapters) for a multi-file audiobook.

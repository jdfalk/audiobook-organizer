<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    .bg { fill: #1a1a2e; }
    .book { fill: #e8c97e; }
    .spine { fill: #c4a55a; }
    .wave { stroke: #60a5fa; fill: none; stroke-linecap: round; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f0f4ff; }
      .book { fill: #d4a017; }
      .spine { fill: #a07810; }
      .wave { stroke: #2563eb; }
    }
  </style>
  <!-- background rounded square -->
  <rect width="32" height="32" rx="6" class="bg"/>
  <!-- book body -->
  <rect x="6" y="8" width="14" height="18" rx="1.5" class="book"/>
  <!-- spine -->
  <rect x="6" y="8" width="3" height="18" rx="1" class="spine"/>
  <!-- pages edge line -->
  <line x1="19" y1="9" x2="19" y2="25" stroke="#b89040" stroke-width="0.75"/>
  <!-- audio waves emanating right from book -->
  <path d="M22 14 C24 14, 25 15.5, 25 16 C25 16.5, 24 18, 22 18" class="wave" stroke-width="1.5"/>
  <path d="M22 11 C26.5 11, 28.5 13.5, 28.5 16 C28.5 18.5, 26.5 21, 22 21" class="wave" stroke-width="1.5"/>
</svg>

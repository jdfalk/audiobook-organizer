name: audiobook-organizer-codeql-config

# Include the custom sanitizer pack
packs:
  go:
    - .github/codeql

# Use security-extended query suite
queries:
  - uses: security-extended

# Ignore test files and vendored code
paths-ignore:
  - '**/*_test.go'
  - 'vendor/**'
  - 'testdata/**'
  - 'third_party/**'

# file: .github/workflows/security.yml
# version: 1.1.0
# guid: 7f2a3c1d-4e5f-6g7h-8i9j-0k1l2m3n4o5p
# last-edited: 2026-05-18
#
# Security scanning: Trivy vulnerabilities, Go/NPM dependency submission for supply chain security.
# Uploads results to code-scanning dashboard.

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * 0' # Weekly Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy
        uses: aquasecurity/trivy-action@6e7b7d1feac574a0a8e8fbdd8f5216a8e309e081 # v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  dependencies:
    name: Dependency Submission
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - language: go
            setup: 'setup-go'
          - language: npm
            setup: 'setup-node'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Setup Node
        if: matrix.language == 'npm'
        uses: actions/setup-node@a8c3f3c891b3f2b7e2d3c8eb2f8d5c5e9d4c3b2a # v4.0.1
        with:
          node-version: '20.x'

      - name: Install NPM dependencies
        if: matrix.language == 'npm'
        working-directory: web
        run: npm ci

      - name: Submit Dependencies
        uses: github/dependency-submission-action@61fde39ba357e84760c4a19ba16d1a2afc98e512 # v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          directory: ${{ matrix.language == 'npm' && 'web' || '.' }}

# file: .github/workflows/security.yml
# version: 2.0.0
# guid: 7f2a3c1d-4e5f-6g7h-8i9j-0k1l2m3n4o5p
# last-edited: 2026-05-27
#
# Security scanning: advanced CodeQL, dependency review, language audits, and
# Go/NPM dependency submission for supply chain security. Third-party filesystem
# SARIF scanners are intentionally disabled.

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * 0' # Weekly Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  advanced-security:
    name: Advanced CodeQL Security
    uses: jdfalk/ghcommon/.github/workflows/reusable-security.yml@main
    with:
      languages: '["go", "javascript", "actions"]'
      skip-codeql: false
      skip-dependency-review: false
      skip-security-audit: false
    secrets: inherit

  dependencies:
    name: Dependency Submission
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - language: go
            setup: 'setup-go'
          - language: npm
            setup: 'setup-node'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Setup Node
        if: matrix.language == 'npm'
        uses: actions/setup-node@a8c3f3c891b3f2b7e2d3c8eb2f8d5c5e9d4c3b2a # v4.0.1
        with:
          node-version: '20.x'

      - name: Install NPM dependencies
        if: matrix.language == 'npm'
        working-directory: web
        run: npm ci

      - name: Submit Dependencies
        uses: github/dependency-submission-action@61fde39ba357e84760c4a19ba16d1a2afc98e512 # v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          directory: ${{ matrix.language == 'npm' && 'web' || '.' }}

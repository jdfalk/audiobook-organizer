# file: .github/workflows/security.yml
# version: 1.0.0
# guid: 7f2a3c1d-4e5f-6g7h-8i9j-0k1l2m3n4o5p
# last-edited: 2026-05-18
#
# GitHub Actions security scanning via Trivy. Detects vulnerabilities in workflow files
# and GitHub Actions used throughout this repository.

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * 0' # Weekly Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-security:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy
        uses: aquasecurity/trivy-action@6e7b7d1feac574a0a8e8fbdd8f5216a8e309e081 # v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

# last-edited: 2026-05-01

name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: write
  actions: write
  checks: write
  packages: write
  id-token: write
  attestations: write

jobs:
  frontend-config:
    name: Determine Frontend Configuration
    runs-on: ubuntu-latest
    outputs:
      dir: ${{ steps.frontend-config.outputs.dir }}
      node-version: ${{ steps.frontend-config.outputs.node-version }}
      has-frontend: ${{ steps.frontend-config.outputs.has-frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Load frontend configuration
        id: frontend-config
        uses: falkcorp/gha-get-frontend-config@5b9202857f9c739d32a4cbca27b14679da01e2c8 # v1.1.3
        with:
          repository-config: ''
          config-file: '.github/repository-config.yml'

  frontend:
    name: Frontend Build and Test
    needs: frontend-config
    if: needs.frontend-config.outputs.has-frontend == 'true'
    uses: falkcorp/github-common/.github/workflows/reusable-ci.yml@f602707c96a8c979ecb9d2f4b0b95874673b2392 # v1.12.1
    with:
      go-version: '1.26'
      go-experiment: 'jsonv2'
      node-version: ${{ needs.frontend-config.outputs.node-version }}
      system-packages: 'libtag1-dev'
    secrets: inherit

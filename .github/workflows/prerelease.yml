# file: .github/workflows/prerelease.yml
# version: 2.9.2
# guid: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
# last-edited: 2026-05-01

name: Prerelease on Merge

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  GHCOMMON_SCRIPTS_DIR: ${{ github.workspace }}/.github/workflows/scripts

jobs:
  prerelease:
    name: Create Prerelease Build
    uses: falkcorp/github-common/.github/workflows/reusable-release.yml@fe1e3081e230dd5ac3d358f9c6a3e4dc0b209529 # v2.13.1
    with:
      release-type: 'auto'
      prerelease: true
      draft: false
      go-enabled: true
      frontend-enabled: true
      docker-enabled: false
      system-packages: 'libtag1-dev'
      pre-build-script: 'cd web && npm ci && npm run build'
      go-experiment: 'jsonv2'
    secrets: inherit

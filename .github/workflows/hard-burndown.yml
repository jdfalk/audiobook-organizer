# file: .github/workflows/hard-burndown.yml
# version: 1.0.0
name: Hard burndown (failed-batch retry)

on:
  schedule:
    - cron: "0 10 * * 0"  # Sundays 10:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full

jobs:
  burndown:
    uses: falkcorp/github-common/.github/workflows/reusable-burndown.yml@bfb912c8e63e7f8e33df9c20c5c25c04083ec0b4 # v1.10.7
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
      hub_repo: falkcorp/burndown-tasks
      task_filter: failed-batch
      powerful_only: true
    secrets: inherit

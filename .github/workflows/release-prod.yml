# file: .github/workflows/release-prod.yml
# version: 4.8.2
# guid: f1a2b3c4-d5e6-7f8a-9b0c-1d2e3f4a5b6c
# last-edited: 2026-06-09

name: Production Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
        default: 'auto'
      create-draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      previous-version:
        description: 'Override previous version for changelog (e.g. v0.205.0). Leave empty for auto-detect.'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Create Production Release
    uses: falkcorp/github-common/.github/workflows/reusable-release.yml@f602707c96a8c979ecb9d2f4b0b95874673b2392 # v2.13.4
    with:
      release-type: ${{ github.event.inputs.release-type }}
      prerelease: false
      draft: ${{ github.event.inputs.create-draft == 'true' }}
      stable: true
      go-enabled: true
      frontend-enabled: true
      docker-enabled: true
      system-packages: 'libtag1-dev'
      pre-build-script: 'cd web && npm ci && npm run build'
      go-experiment: 'jsonv2'
      previous-version: ${{ github.event.inputs.previous-version }}
    secrets: inherit

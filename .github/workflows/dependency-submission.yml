#
# Dependency submission for supply chain security. Submits Go module and npm dependencies
# to GitHub's dependency graph for vulnerability tracking and SBOM generation.

name: Dependency Submission

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-submission-go:
    name: Go Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Submit Go Dependencies
        uses: github/dependency-submission-action@61fde39ba357e84760c4a19ba16d1a2afc98e512 # v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dependency-submission-npm:
    name: NPM Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@a8c3f3c891b3f2b7e2d3c8eb2f8d5c5e9d4c3b2a # v4.0.1
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Submit NPM Dependencies
        uses: github/dependency-submission-action@61fde39ba357e84760c4a19ba16d1a2afc98e512 # v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          directory: 'web'

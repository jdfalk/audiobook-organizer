# file: .github/workflows/nightly-burndown.yml
# version: 2.3.0
name: Nightly burndown

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full
      max_tasks:
        description: "Cap dispatched tasks (0 = unlimited)"
        required: false
        default: "0"
        type: string

jobs:
  burndown:
    uses: falkcorp/github-common/.github/workflows/reusable-burndown.yml@f602707c96a8c979ecb9d2f4b0b95874673b2392 # v1.10.0
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
      hub_repo: falkcorp/burndown-tasks
      cheapest_only: true
      triage_model: gpt-4.1
      max_tasks: ${{ fromJSON(inputs.max_tasks || '0') }}
    secrets: inherit

# file: .github/workflows/nightly-burndown.yml
# version: 1.4.0
name: Nightly burndown

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full

jobs:
  burndown:
    uses: jdfalk/ghcommon/.github/workflows/reusable-burndown.yml@8d38c68b533e2bc004275a4c308c72c29ca58a0e
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
    secrets: inherit

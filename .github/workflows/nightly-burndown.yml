# file: .github/workflows/nightly-burndown.yml
# version: 1.7.0
name: Nightly burndown

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full

jobs:
  burndown:
    uses: falkcorp/github-common/.github/workflows/reusable-burndown.yml@bfb912c850effd1ae9aded26d14856a538d3e5fc # v1.10.7
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
      hub_repo: falkcorp/burndown-tasks
    secrets: inherit

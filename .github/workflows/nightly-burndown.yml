# file: .github/workflows/nightly-burndown.yml
# version: 1.7.0
name: Nightly burndown

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full

jobs:
  burndown:
    uses: falkcorp/github-common/.github/workflows/reusable-burndown.yml@2b9f83e6f0b215e8a7e709e7df9f8aec293f01a7
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
    secrets: inherit

# file: .github/workflows/nightly-burndown.yml
# version: 2.7.0
name: Nightly burndown

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC morning run
    - cron: "0 20 * * *"  # 20:00 UTC evening run (backup + catches GitHub scheduler drift)
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full
      max_tasks:
        description: "Cap dispatched tasks (0 = unlimited)"
        required: false
        default: "0"
        type: string

jobs:
  burndown:
    uses: falkcorp/github-common/.github/workflows/reusable-burndown.yml@0484decdc8ca852b2f66b9ab004cac5180c7b24d # v1.11.1
    with:
      # Scheduled runs always use full mode (auto-merge ready PRs).
      # Manual dispatch respects the input selection (default: draft-only for safety).
      mode: ${{ github.event_name == 'schedule' && 'full' || inputs.mode || 'draft-only' }}
      hub_repo: falkcorp/burndown-tasks
      cheapest_only: true
      triage_model: gpt-4.1
      # Scheduled runs cap at 8 tasks to avoid OpenAI 429 rate-limit exhaustion
      # from 22+ simultaneous agent calls. Manual dispatch can override to 0 (unlimited).
      max_tasks: ${{ github.event_name == 'schedule' && 8 || fromJSON(inputs.max_tasks || '0') }}
    secrets: inherit

# file: .github/workflows/nightly-burndown.yml
# version: 1.3.0
name: Nightly burndown

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full

jobs:
  burndown:
    uses: jdfalk/ghcommon/.github/workflows/reusable-burndown.yml@2e30fe84da1897e4e336c641a2cb5bc31ea69855
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
    secrets: inherit

# file: .github/workflows/triage-poll.yml
# version: 1.0.1
name: Triage poll

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full

jobs:
  triage-poll:
    uses: jdfalk/ghcommon/.github/workflows/reusable-triage-poll.yml@bfb912c850effd1ae9aded26d14856a538d3e5fc
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
      triage_model: o3
    secrets: inherit

# file: .github/workflows/triage-poll.yml
# version: 1.0.2
name: Triage poll

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run | draft-only | full"
        required: false
        default: draft-only
        type: choice
        options:
          - dry-run
          - draft-only
          - full

jobs:
  triage-poll:
    uses: jdfalk/ghcommon/.github/workflows/reusable-triage-poll.yml@acbc1ec5a64c5fb497a5077c3a56e56d5e7b4873
    with:
      mode: ${{ inputs.mode || 'draft-only' }}
      triage_model: gpt-5.4-mini
    secrets: inherit
